preset_version: 1
preset_name: "operator_tier_hard"

operators:
  - name: AddSubstituent
    params:
      library: "medchem_v1"

  - name: RGroupSwap
    params:
      library: "medchem_v1"

  - name: RingSubstituentDelete

  - name: LinkerInsertCH2
  - name: LinkerDeleteCH2
  - name: LinkerAtomSwap

  - name: AromaticSubstituentSwap
    params:
      allow_charge_change: true

  - name: SmirksLibraryOperator
    params:
      allow_charge_change: true
      min_heavy_atoms: 3

constraints:
  - name: MedchemFilters
    params:
      min_heavy_atoms: 3
      max_heavy_atoms: 80
      allow_charge_range: [-2, 2]
