preset_version: 1
name: docking_vina_cli

actions:
  operators:
    - type: PruneTerminal
      params: {}
    - type: AtomMutation
      params: {}
  max_steps: 6
  rules:
    ban_motifs: true
    use_pains: false
    use_brenk: false
    use_nih: false
    max_mw: 650.0
    max_logp: 6.5

constraints:
  - type: SizeConstraint
    params:
      max_heavy_atoms: 60

scoring:
  type: DockingScorer
  params:
    # Phase 8.B: real backend via Vina CLI subprocess (implemented in B1)
    engine: vina_cli # or smina_cli / gnina_cli / qvina_cli
    engine_version: "0"
    protocol: standard

    # User must provide receptor PDBQT for real docking.
    # Tests validate schema/loader only; they do not require the file to exist.
    receptor_path: data/receptors/example_receptor.pdbqt

    box:
      center: [0.0, 0.0, 0.0]
      size: [20.0, 20.0, 20.0]

    # Cache is recommended for reproducibility; cache hits should not consume budget.
    cache_dir: runs/_docking_cache_vina_cli
    budget: 100
    seed: 0
    timeout_s: 60.0

    params:
      binary_path: null
      cpu: 1
      exhaustiveness: 8

    # Other options:
    #engine: smina_cli
    #params:
    #  binary_name: smina     # optional; default is smina
    #  cpu: 8
    #  exhaustiveness: 16
    #  extra_args: ["--scoring", "vina"]
    #===================================
    #engine: gnina_cli
    #params:
    #  binary_name: gnina     # optional; default is gnina
    #  cpu: 8
    #  exhaustiveness: 16
    #  extra_args: ["--cnn_scoring", "rescore"]
    #===================================
    #engine: qvina_cli
    #params:
    #  binary_name: qvina2    # default is qvina2; override if you use qvina-w, qvina2.1, etc.
    #  cpu: 8
    #  exhaustiveness: 16
    #  extra_args: ["--gpu", "--device", "0"]
    #===================================
    #engine: vina_py
    #params:
    #  sf_name: vina
    #  cpu: 4
    #  exhaustiveness: 8
    #  n_poses: 10

reward:
  mode: terminal
  step_penalty: 0.01
  compute_cost_weight: 0.0
  constraint_penalty_weight: 1.0
  bonus: 0.0

training:
  algorithm: ppo
  total_timesteps: 200000
  gamma: 0.99
  seed: 0

logging:
  save_preset_yaml: true
  log_git_commit: true
  log_scorer_metadata: true
  log_constraint_metadata: true
