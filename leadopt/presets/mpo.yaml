preset_version: 1
name: mpo

actions:
  operators:
    - type: PruneTerminal
      params: {}
    - type: RGroupSwap
      params:
        max_sidechain_heavy_atoms: 12
  max_steps: 8
  rules:
    ban_motifs: true
    use_pains: false
    use_brenk: false
    use_nih: false
    max_mw: 650.0
    max_logp: 6.5

constraints: []

scoring:
  type: LegacyFunctionScorer
  params:
    function: "leadopt.score.mpo:example_mpo_score"

reward:
  mode: terminal
  step_penalty: 0.01
  compute_cost_weight: 0.0
  constraint_penalty_weight: 1.0
  bonus: 0.0

training:
  algorithm: ppo
  total_timesteps: 200000
  gamma: 0.99
  seed: 0

logging:
  save_preset_yaml: true
  log_git_commit: true
  log_scorer_metadata: true
  log_constraint_metadata: true
