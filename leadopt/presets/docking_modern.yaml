preset_version: 1
name: docking_modern

actions:
  operators:
    - type: PruneTerminal
      params: {}
    - type: AtomMutation
      params: {}
  max_steps: 6
  rules:
    ban_motifs: true
    use_pains: false
    use_brenk: false
    use_nih: false
    max_mw: 650.0
    max_logp: 6.5

constraints:
  - type: SizeConstraint
    params:
      max_heavy_atoms: 60

scoring:
  type: DockingScorer
  params:
    engine: mock
    engine_version: "0"
    protocol: standard

    # NOTE: for actual CLI runs, this file must exist.
    # Tests only validate schema and loader instantiation; they do not require existence.
    receptor_path: data/receptors/example_receptor.pdbqt

    box:
      center: [0.0, 0.0, 0.0]
      size: [20.0, 20.0, 20.0]

    # Enable Phase 4.3 caching for development reproducibility
    cache_dir: runs/_docking_cache
    budget: 100
    seed: 0
    timeout_s: 30.0
    params:
      exhaustiveness: 8

reward:
  mode: terminal
  step_penalty: 0.01
  compute_cost_weight: 0.0
  constraint_penalty_weight: 1.0
  bonus: 0.0

training:
  algorithm: ppo
  total_timesteps: 200000
  gamma: 0.99
  seed: 0

logging:
  save_preset_yaml: true
  log_git_commit: true
  log_scorer_metadata: true
  log_constraint_metadata: true
