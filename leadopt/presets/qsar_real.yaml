preset_version: 1
name: qsar_real

actions:
  operators:
    - type: PruneTerminal
      params: {}
    - type: AtomMutation
      params: {}
  max_steps: 8
  rules:
    ban_motifs: true
    use_pains: false
    use_brenk: false
    use_nih: false
    max_mw: 650.0
    max_logp: 6.5

constraints:
  - type: SizeConstraint
    params:
      max_heavy_atoms: 60

scoring:
  type: qsar_real
  params:
    model:
      # User-provided pickled model file (no bundled models).
      # SECURITY NOTE: only load models you trust (pickle can execute code).
      path: /path/to/model.pkl
      # How the model consumes inputs:
      # - fingerprint: leadopt computes deterministic Morgan fingerprints and passes a numpy array to model.predict(X)
      # - smiles: leadopt passes canonical SMILES strings to model.predict(smiles_list)
      input_mode: fingerprint
    features:
      # Used only when model.input_mode=fingerprint
      kind: morgan
      radius: 2
      n_bits: 2048
      use_chirality: true
      use_features: false
    cache:
      enabled: true
      dir: .leadopt_cache/qsar_real

reward:
  mode: terminal
  step_penalty: 0.01
  compute_cost_weight: 0.0
  constraint_penalty_weight: 1.0
  bonus: 0.0

training:
  algorithm: ppo
  total_timesteps: 200000
  gamma: 0.99
  seed: 0

logging:
  save_preset_yaml: true
  log_git_commit: true
  log_scorer_metadata: true
  log_constraint_metadata: true
